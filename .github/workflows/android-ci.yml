name: Android CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Android app
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Show toolchain versions
        run: |
          java -version
          ./gradlew --version --no-daemon

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Verify release signing secrets
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
        run: |
          missing=0
          for name in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD \
            ANDROID_RELEASE_STORE_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing release signing secret::${name} is required for release APK builds."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Release APK build cannot continue until all Android release signing secrets are configured."
            exit 1
          fi

      - name: Decode release keystore
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/lifelab-signing"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/lifelab-signing/lifelab-release.jks"
          test -s "$RUNNER_TEMP/lifelab-signing/lifelab-release.jks"

      - name: Assemble release APK
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease --no-daemon \
            -PLIFELAB_RELEASE_STORE_FILE="$RUNNER_TEMP/lifelab-signing/lifelab-release.jks" \
            -PLIFELAB_RELEASE_KEY_ALIAS="$ANDROID_RELEASE_KEY_ALIAS" \
            -PLIFELAB_RELEASE_KEY_PASSWORD="$ANDROID_RELEASE_KEY_PASSWORD" \
            -PLIFELAB_RELEASE_STORE_PASSWORD="$ANDROID_RELEASE_STORE_PASSWORD"

      - name: Upload release APK
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: lifelab-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 7
